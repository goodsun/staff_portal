name: PR通知 → メフィ

on:
  pull_request:
    types: [opened, synchronize, closed, review_requested]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Telegram通知
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # イベント種別でメッセージ組み立て
          EVENT="${{ github.event_name }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          ACTOR="${{ github.actor }}"

          if [ "$EVENT" = "pull_request" ]; then
            ACTION="${{ github.event.action }}"
            case "$ACTION" in
              opened)      EMOJI="🆕"; MSG="PRが作成されました" ;;
              synchronize) EMOJI="🔄"; MSG="PRに新しいコミットが追加されました" ;;
              closed)
                if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
                  EMOJI="✅"; MSG="PRがマージされました"
                else
                  EMOJI="❌"; MSG="PRがクローズされました"
                fi ;;
              review_requested) EMOJI="👀"; MSG="レビューがリクエストされました" ;;
              *) EMOJI="📌"; MSG="PRが更新されました" ;;
            esac
          elif [ "$EVENT" = "pull_request_review" ]; then
            STATE="${{ github.event.review.state }}"
            case "$STATE" in
              approved)          EMOJI="✅"; MSG="PRが承認されました" ;;
              changes_requested) EMOJI="🔴"; MSG="変更リクエストが届きました" ;;
              commented)         EMOJI="💬"; MSG="レビューコメントが届きました" ;;
              *) EMOJI="📝"; MSG="レビューが更新されました" ;;
            esac
          fi

          TEXT="${EMOJI} labo-portal PR #${PR_NUM}
${MSG}

📌 ${PR_TITLE}
👤 ${ACTOR}
🔗 ${PR_URL}"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "parse_mode=HTML" \
            --max-time 10
